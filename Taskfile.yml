version: "3"

tasks:
  default:
    desc: Build all packages
    cmds:
      - task: build

  tidy:
    desc: 'Go tidy all the things'
    run: once
    cmds:
      - GOWORK=off go mod tidy
      - cd cmd && go mod tidy

  build:
    desc: Build all packages
    deps:
      - cli:build
      - examples:build

  examples:build:
    desc: Build example programs
    deps: [tidy]
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - bin/simple
      - bin/chat
      - bin/toolloop
      - bin/openai-compatible
    cmds:
      - go build -o bin/simple ./examples/simple
      - go build -o bin/chat ./examples/chat
      - go build -o bin/toolloop ./examples/toolloop
      - go build -o bin/openai-compatible ./examples/openai-compatible

  cli:build:
    desc: Build the ds4go CLI
    deps: [tidy]
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
      - cmd/go.mod
      - cmd/go.sum
    generates:
      - bin/ds4go
    cmds:
      - go build -o bin/ds4go ./cmd/ds4go

  test:
    desc: Run Go tests
    deps: [tidy]
    cmds:
      - go test ./... ./cmd/...

  vet:
    desc: Run Go vet
    cmds:
      - go vet ./... ./cmd/...

  pre-push:
    desc: Verify formatting, build, and vet — run this before pushing
    cmds:
      - GOWORK=off go mod tidy
      - cd cmd && go mod tidy
      - cmd: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "gofmt: these files need formatting:"
            echo "$files"
            exit 1
          fi
      - go build ./... ./cmd/...
      - go vet ./... ./cmd/...

  hooks:install:
    desc: Install git pre-push hook that runs 'task pre-push'
    cmds:
      - git config core.hooksPath .githooks

  clean:
    desc: Remove built binaries
    cmds:
      - rm -f ./bin/simple ./bin/chat ./bin/toolloop ./bin/openai-compatible ./bin/ds4go
