version: "3"

tasks:
  default:
    desc: Build all packages
    cmds:
      - task: build

  tidy:
    desc: 'Go tidy all the things'
    run: once
    cmds:
      - go mod tidy

  build:
    desc: Build all packages
    deps:
      - cli:build
      - examples:build

  examples:build:
    desc: Build example programs
    deps: [tidy]
    cmds:
      - go build -o bin/simple ./examples/simple
      - go build -o bin/chat ./examples/chat
      - go build -o bin/openai-compatible ./examples/openai-compatible

  cli:build:
    desc: Build the ds4-go CLI
    deps: [tidy]
    cmds:
      - go build -o bin/ds4-go ./cmd/ds4-go

  test:
    desc: Run Go tests
    deps: [tidy]
    cmds:
      - go test ./...

  vet:
    desc: Run Go vet
    cmds:
      - go vet ./...

  pre-push:
    desc: Verify formatting, build, and vet — run this before pushing
    cmds:
      - go mod tidy
      - cmd: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "gofmt: these files need formatting:"
            echo "$files"
            exit 1
          fi
      - go build ./...
      - go vet ./...

  clean:
    desc: Remove built binaries
    cmds:
      - rm -f ./bin/simple ./bin/chat ./bin/openai-compatible ./bin/ds4-go
