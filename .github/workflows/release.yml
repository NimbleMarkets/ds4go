name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # Guard: ensure the tagged commit builds and vets cleanly before releasing.
  check:
    name: Build and verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go mod tidy && git diff --exit-code go.mod go.sum
      - run: go build ./...
      - run: go vet ./...

  release:
    name: Release (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - { goos: darwin,  goarch: arm64, ext: ""     }
          - { goos: darwin,  goarch: amd64, ext: ""     }
          - { goos: linux,   goarch: amd64, ext: ""     }
          - { goos: windows, goarch: amd64, ext: .exe   }

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir dist
          go build -o dist/ds4-go${{ matrix.ext }}              ./cmd/ds4-go
          go build -o dist/simple${{ matrix.ext }}              ./examples/simple
          go build -o dist/chat${{ matrix.ext }}                ./examples/chat
          go build -o dist/openai-compatible${{ matrix.ext }}   ./examples/openai-compatible

      - name: Archive
        run: |
          archive="ds4-go_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.zip"
          cd dist && zip "../$archive" ./*
          echo "ARCHIVE=$archive" >> "$GITHUB_ENV"

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.ARCHIVE }}
