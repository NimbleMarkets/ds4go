name: Shellcheck
on:
  pull_request:
    paths:
      - 'scripts/**'
      - '.github/workflows/shellcheck.yml'
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/shellcheck.yml'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: scripts
          severity: warning
