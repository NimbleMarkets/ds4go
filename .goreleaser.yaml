# ds4go .goreleaser.yaml
#
# ds4go is a pure-Go (purego) CLI: no CGO, so it cross-compiles cleanly to
# every platform with the stock toolchain — no goreleaser-cross needed.
#
# Tagged releases publish archives + checksums to GitHub Releases and update
# the Homebrew cask in NimbleMarkets/homebrew-tap.
version: 2

project_name: ds4go

before:
  hooks:
    - go mod tidy

builds:
  - id: ds4go
    main: ./cmd/ds4go
    binary: ds4go
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

# Sign and notarize the macOS binaries with Apple. GoReleaser does this
# in-process (no macOS runner needed); it is skipped unless MACOS_SIGN_P12
# is set, so snapshot builds and forks without the secrets still work.
notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      ids:
        - ds4go
      sign:
        certificate: "{{.Env.MACOS_SIGN_P12}}"
        password: "{{.Env.MACOS_SIGN_PASSWORD}}"
        entitlements: ./etc/entitlements.plist
      notarize:
        issuer_id: "{{.Env.MACOS_NOTARY_ISSUER_ID}}"
        key_id: "{{.Env.MACOS_NOTARY_KEY_ID}}"
        key: "{{.Env.MACOS_NOTARY_KEY}}"
        wait: true
        timeout: 20m

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: NimbleMarkets
    name: ds4go

homebrew_casks:
  - name: ds4go
    ids:
      - default
    homepage: https://github.com/NimbleMarkets/ds4go
    description: "Pure-Go ds4 inference tooling for the DeepSeek-V4 engine"
    repository:
      owner: NimbleMarkets
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: goreleaserbot@nimble.markets
    generate_completions_from_executable:
      args:
        - completion
      shell_parameter_format: cobra
